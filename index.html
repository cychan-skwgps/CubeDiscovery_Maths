<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級立體圖形-正方體大發現</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; 
            overflow: hidden; 
            transition: background 0.5s ease;
            background: #f8fafc;
            min-height: 100vh;
            margin: 0;
        }
        .btn-choice { transition: all 0.2s; border-bottom-width: 6px; }
        .btn-choice:active { transform: translateY(2px); border-bottom-width: 2px; }
        
        canvas { touch-action: none; }

        @keyframes fever-bg {
            0% { background: #fee2e2; }
            25% { background: #fef3c7; }
            50% { background: #dcfce7; }
            75% { background: #e0f2fe; }
            100% { background: #fee2e2; }
        }
        .fever-mode-active { animation: fever-bg 2s infinite linear !important; }
        
        @keyframes fever-number {
            0%, 100% { transform: scale(1); color: #e03c31; text-shadow: 0 0 5px rgba(224, 60, 49, 0.3); }
            50% { transform: scale(1.5); color: #753bbd; text-shadow: 0 0 15px #f7ea48; }
        }
        .fever-number-active { animation: fever-number 0.4s infinite ease-in-out; display: inline-block; }

        @keyframes correct-burst {
            0% { transform: scale(0.2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .feedback-correct { animation: correct-burst 0.5s ease-out forwards; color: #2dc84d !important; }

        @keyframes error-shake {
            0%, 100% { transform: translateX(0); opacity: 1; }
            20%, 60% { transform: translateX(-20px); }
            40%, 80% { transform: translateX(20px); }
            100% { opacity: 0; }
        }
        .feedback-error { animation: error-shake 0.5s ease-in-out forwards; color: #e03c31 !important; }

        .bg-level-0 { background: #f0f9ff; }
        .bg-level-1 { background: #fff7ed; }
        .bg-level-2 { background: #fffbeb; }

        /* 進度條平滑過渡 */
        #timer-bar { transition: width 1s linear, background-color 0.3s ease; }
    </style>
</head>
<body id="body-main" class="flex items-center justify-center p-4 bg-level-0">

    <div id="game-container" class="bg-white/80 backdrop-blur-xl rounded-[3rem] shadow-2xl w-full max-w-7xl aspect-video flex flex-col relative overflow-hidden border-4 border-white">
        
        <!-- 狀態列 -->
        <div class="h-24 w-full px-10 flex flex-col justify-center bg-white/90 border-b-2 border-slate-100 z-20 relative">
            <div class="flex items-center justify-between w-full">
                <div id="hearts-container" class="flex gap-1 items-center"></div>

                <div id="combo-tag" class="hidden flex flex-col items-center justify-center relative">
                    <span class="text-[10px] font-black tracking-widest uppercase opacity-60">連擊</span>
                    <span id="combo-count" class="text-4xl font-black italic text-indigo-600">0</span>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 bg-slate-800 px-5 py-2 rounded-2xl shadow-lg">
                        <span class="text-slate-400 font-bold text-xs uppercase">Time</span>
                        <p id="timer" class="text-2xl font-mono font-black text-emerald-400">45</p>
                    </div>
                    
                    <div class="bg-indigo-600 text-white px-5 py-2 rounded-2xl shadow-lg border-b-4 border-indigo-900">
                        <p id="score" class="text-2xl font-black">0</p>
                    </div>

                    <button id="quick-exit-btn" class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-200 text-slate-400 hover:text-rose-500 rounded-xl transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
            </div>
            
            <!-- 時間進度條容器 -->
            <div class="absolute bottom-0 left-0 w-full h-1.5 bg-slate-100 overflow-hidden">
                <div id="timer-bar" class="h-full bg-emerald-400 w-full"></div>
            </div>
        </div>

        <!-- 主區域 -->
        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 relative flex flex-col items-center justify-center">
                <div id="question-area" class="absolute top-8 text-center z-20 px-4">
                    <h2 id="question-main" class="text-3xl font-black text-slate-800 tracking-tight leading-snug">載入中...</h2>
                </div>

                <canvas id="prismCanvas"></canvas>
                <div id="feedback-layer" class="absolute inset-0 flex items-center justify-center pointer-events-none z-30">
                    <span id="feedback-icon" class="text-[15rem] font-black opacity-0"></span>
                </div>
            </div>

            <!-- 選項區 -->
            <div class="w-[400px] h-full p-8 flex flex-col justify-center border-l-2 border-slate-100 bg-slate-50/50">
                <div id="options-grid" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>

        <!-- 遮罩層系統 -->
        <div id="overlay" class="absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center p-8 transition-all duration-500">
            
            <!-- 開始畫面 -->
            <div id="start-screen" class="max-w-4xl w-full flex flex-col items-center text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg mb-6 animate-bounce">
                    <span class="text-3xl">🎲</span>
                </div>
                <h1 class="text-5xl font-black text-slate-900 mb-8 tracking-tighter">正方體<span class="text-indigo-600">大發現</span></h1>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full mb-10 text-left">
                    <div class="flex flex-col gap-4">
                        <button id="start-btn-normal" class="bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-2xl text-xl shadow-[0_6px_0_0_rgba(49,46,129,1)] active:translate-y-1 active:shadow-none transition-all">普通模式</button>
                        <button id="start-btn-hard" class="bg-rose-600 hover:bg-rose-700 text-white font-black py-4 rounded-2xl text-xl shadow-[0_6px_0_0_rgba(159,18,57,1)] active:translate-y-1 active:shadow-none transition-all">困難模式</button>
                    </div>
                    <div class="bg-white rounded-3xl p-6 border-2 border-indigo-50 shadow-inner overflow-hidden flex flex-col h-[300px]">
                        <h3 class="text-slate-800 font-black text-lg mb-4 flex items-center gap-2">🏆 排行榜</h3>
                        <div class="flex gap-2 mb-4 text-xs font-bold">
                            <button id="tab-normal" class="flex-1 py-1 rounded-lg bg-indigo-600 text-white">普通</button>
                            <button id="tab-hard" class="flex-1 py-1 rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200">困難</button>
                        </div>
                        <div id="leaderboard-list" class="space-y-2 text-sm overflow-y-auto pr-2"></div>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <p class="text-slate-300 font-bold uppercase tracking-widest text-xs">數學空間感增強訓練</p>
                    <p class="text-slate-400 font-black text-sm">陳俊諺老師製作</p>
                </div>
            </div>

            <!-- 完結流程整合畫面 -->
            <div id="end-screen" class="hidden text-center max-w-2xl w-full">
                <h2 id="end-title" class="text-4xl font-black text-slate-800 mb-6">挑戰結束</h2>
                
                <div class="bg-indigo-50 rounded-[3rem] p-10 mb-8 border-4 border-white shadow-xl flex flex-col items-center">
                    <p class="text-slate-400 font-bold text-xs mb-2 uppercase">FINAL SCORE</p>
                    <div class="text-8xl font-black text-indigo-600 mb-8" id="final-score">0</div>
                    
                    <div class="w-full border-t-2 border-indigo-100 pt-8">
                        <p class="text-slate-600 font-bold mb-4">請輸入你的名字：</p>
                        <input type="text" id="player-name-input" maxlength="8" class="w-full text-center text-2xl font-black border-4 border-white rounded-2xl p-4 shadow-inner outline-none focus:border-indigo-400 transition-all placeholder-slate-300" placeholder="匿名玩家">
                    </div>
                </div>

                <div class="w-full">
                    <button id="save-and-exit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-[2rem] text-2xl shadow-[0_8px_0_0_rgba(49,46,129,1)] active:translate-y-1 active:shadow-none transition-all">儲存及返回標題</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('prismCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const timerBar = document.getElementById('timer-bar');
        const heartsContainer = document.getElementById('hearts-container');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const questionMain = document.getElementById('question-main');
        const leaderboardList = document.getElementById('leaderboard-list');
        
        const colorPalette = [
            { name: "紅色", hex: "#e03c31" },
            { name: "橙色", hex: "#ff7f41" },
            { name: "黃色", hex: "#f7ea48" },
            { name: "綠色", hex: "#2dc84d" },
            { name: "藍色", hex: "#147bd1" },
            { name: "紫色", hex: "#753bbd" }
        ];

        const INITIAL_TIME = 45;
        let score = 0, combo = 0, timeLeft = INITIAL_TIME, gameActive = false, timerInterval;
        let lives = 8, angleX = 0, angleY = 0, angleZ = 0, rotSpeed = { x: 0, y: 0, z: 0 };
        let cubeFaces = []; 
        let currentQuestion = null; 
        let isHardMode = false;
        let isFever = false;
        let currentLeaderboardTab = 'normal';

        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function rotate3D(x, y, z) {
            const time = Date.now() * 0.001;
            const wobbleX = Math.sin(time * 0.7) * 0.3;
            const wobbleY = Math.cos(time * 0.5) * 0.3;

            let y1 = y * Math.cos(angleX + wobbleX) - z * Math.sin(angleX + wobbleX);
            let z1 = y * Math.sin(angleX + wobbleX) + z * Math.cos(angleX + wobbleX);
            let x2 = x * Math.cos(angleY + wobbleY) + z1 * Math.sin(angleY + wobbleY);
            let z2 = -x * Math.sin(angleY + wobbleY) + z1 * Math.cos(angleY + wobbleY);
            let x3 = x2 * Math.cos(angleZ) - y1 * Math.sin(angleZ);
            let y3 = x2 * Math.sin(angleZ) + y1 * Math.cos(angleZ);
            return { x: x3, y: y3, z: z2 };
        }

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            angleX += rotSpeed.x; angleY += rotSpeed.y; angleZ += rotSpeed.z;
            
            const time = Date.now() * 0.001;
            let offsetX = 0;
            let offsetY = 0;
            if (isHardMode) {
                offsetX = Math.sin(time * 1.5) * 40;
                offsetY = Math.cos(time * 2.2) * 25;
            }

            const size = 125;
            const v = [
                {x:-1, y:-1, z: 1}, {x: 1, y:-1, z: 1}, {x: 1, y: 1, z: 1}, {x:-1, y: 1, z: 1}, 
                {x:-1, y:-1, z:-1}, {x: 1, y:-1, z:-1}, {x: 1, y: 1, z:-1}, {x:-1, y: 1, z:-1}
            ].map(p => rotate3D(p.x * size, p.y * size, p.z * size));

            const facesDef = [
                { idx: 0, pts: [v[0], v[1], v[2], v[3]] }, { idx: 1, pts: [v[5], v[4], v[7], v[6]] }, 
                { idx: 2, pts: [v[4], v[5], v[1], v[0]] }, { idx: 3, pts: [v[3], v[2], v[6], v[7]] }, 
                { idx: 4, pts: [v[4], v[0], v[3], v[7]] }, { idx: 5, pts: [v[1], v[5], v[6], v[2]] }  
            ];
            
            facesDef.forEach(f => { f.z = f.pts.reduce((s, p) => s + p.z, 0) / 4; });
            facesDef.sort((a, b) => b.z - a.z);
            
            const centerX = canvas.width / 2 + offsetX;
            const centerY = canvas.height / 2 + offsetY;
            
            facesDef.forEach(face => {
                const v1 = { x: face.pts[1].x - face.pts[0].x, y: face.pts[1].y - face.pts[0].y };
                const v2 = { x: face.pts[2].x - face.pts[0].x, y: face.pts[2].y - face.pts[0].y };
                const crossZ = v1.x * v2.y - v1.y * v2.x;
                if (crossZ > 0) {
                    const color = colorPalette[cubeFaces[face.idx]];
                    ctx.beginPath();
                    face.pts.forEach((p, i) => { 
                        const px = centerX + p.x; 
                        const py = centerY + p.y; 
                        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); 
                    });
                    ctx.closePath(); 
                    ctx.fillStyle = color.hex; 
                    ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.15)"; 
                    ctx.lineWidth = 2; 
                    ctx.stroke();
                }
            });
            requestAnimationFrame(draw);
        }

        function generateChallenge() {
            const type = Math.random() > 0.5 ? 'opposite' : 'count';
            if (type === 'opposite') {
                const indices = [0, 1, 2, 3, 4, 5];
                for (let i = 5; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; }
                cubeFaces = indices;
                const faceIdx = Math.floor(Math.random() * 6);
                const oppositeIdx = faceIdx % 2 === 0 ? faceIdx + 1 : faceIdx - 1;
                const targetIdx = cubeFaces[faceIdx];
                const answerIdx = cubeFaces[oppositeIdx];
                currentQuestion = { type: 'opposite', targetName: colorPalette[targetIdx].name, targetHex: colorPalette[targetIdx].hex, answer: answerIdx };
                questionMain.innerHTML = `<span style="background:${currentQuestion.targetHex}; color: ${isDark(currentQuestion.targetHex)?'white':'black'}" class="px-3 py-1 rounded-xl shadow-sm">「${currentQuestion.targetName}」</span> 的對面是什麼顏色？`;
            } else {
                const faces = []; const counts = Array(6).fill(0);
                for(let i=0; i<6; i++) { let c; do { c = Math.floor(Math.random() * 6); } while(counts[c] >= 3); faces.push(c); counts[c]++; }
                cubeFaces = faces;
                const targetIdx = Math.floor(Math.random() * 6);
                currentQuestion = { type: 'count', targetName: colorPalette[targetIdx].name, targetHex: colorPalette[targetIdx].hex, answer: counts[targetIdx] };
                questionMain.innerHTML = `正方體上有幾個 <span style="background:${currentQuestion.targetHex}; color: ${isDark(currentQuestion.targetHex)?'white':'black'}" class="px-3 py-1 rounded-xl shadow-sm">「${currentQuestion.targetName}」</span> 面？`;
            }
            const base = isHardMode ? 0.1 : 0.01;
            rotSpeed = { x: base + Math.random() * 0.02, y: base + Math.random() * 0.02, z: base + Math.random() * 0.02 };
            renderOptions();
        }

        function isDark(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return (r*0.299 + g*0.587 + b*0.114) < 150;
        }

        function renderOptions() {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            if (currentQuestion.type === 'opposite') {
                colorPalette.forEach((c, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-choice bg-white p-3 rounded-2xl shadow-md border-b-slate-200 flex flex-col items-center gap-1 group';
                    btn.innerHTML = `<div class="w-12 h-12 rounded-xl transition-transform group-hover:scale-110" style="background:${c.hex}"></div><span class="text-xs font-black text-slate-600">${c.name}</span>`;
                    btn.onclick = () => checkAnswer(idx);
                    grid.appendChild(btn);
                });
            } else {
                [0, 1, 2, 3].forEach(num => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-choice bg-white py-6 rounded-2xl shadow-md border-b-slate-200 text-4xl font-black text-slate-700 hover:bg-indigo-50 transition-colors';
                    btn.innerText = num;
                    btn.onclick = () => checkAnswer(num);
                    grid.appendChild(btn);
                });
            }
        }

        function checkAnswer(val) {
            if (!gameActive) return;
            const isCorrect = val === currentQuestion.answer;
            const icon = document.getElementById('feedback-icon');
            icon.className = "text-[15rem] font-black opacity-0"; void icon.offsetWidth;
            if (isCorrect) {
                combo++;
                let points = (isHardMode ? 40 : 20) + Math.min(combo, 10) * 5;
                if (isFever) points *= 2; 
                score += points;
                icon.innerText = "✅"; icon.classList.add('feedback-correct');
            } else {
                combo = 0; lives--;
                icon.innerText = "❌"; icon.classList.add('feedback-error');
                updateHearts(); if (lives <= 0) { endGame("生命耗盡！"); return; }
            }
            scoreEl.innerText = score; updateComboUI(); generateChallenge();
        }

        function updateComboUI() {
            const tag = document.getElementById('combo-tag'), comboCountEl = document.getElementById('combo-count'), body = document.getElementById('body-main');
            if (combo >= 2) { tag.classList.remove('hidden'); comboCountEl.innerText = combo; } else { tag.classList.add('hidden'); }
            if (combo >= 5) {
                isFever = true; body.classList.add('fever-mode-active'); comboCountEl.classList.add('fever-number-active');
            } else {
                isFever = false; body.classList.remove('fever-mode-active'); comboCountEl.classList.remove('fever-number-active');
                body.className = "flex items-center justify-center p-4 transition-all duration-1000 " + (combo >= 4 ? 'bg-level-2' : combo >= 2 ? 'bg-level-1' : 'bg-level-0');
            }
        }

        function updateHearts() {
            heartsContainer.innerHTML = Array(8).fill(0).map((_, i) => `<span class="text-xl transition-all duration-300 ${i < lives ? 'scale-110' : 'grayscale opacity-20 scale-75'}">❤️</span>`).join('');
        }

        function updateLeaderboard(tab = currentLeaderboardTab) {
            currentLeaderboardTab = tab;
            const storageKey = tab === 'normal' ? 'cube_scores_normal' : 'cube_scores_hard';
            const scores = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            document.getElementById('tab-normal').className = tab === 'normal' ? 'flex-1 py-1 rounded-lg bg-indigo-600 text-white shadow-sm' : 'flex-1 py-1 rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200';
            document.getElementById('tab-hard').className = tab === 'hard' ? 'flex-1 py-1 rounded-lg bg-rose-600 text-white shadow-sm' : 'flex-1 py-1 rounded-lg bg-slate-100 text-slate-500 hover:bg-slate-200';

            if (scores.length === 0) {
                leaderboardList.innerHTML = '<p class="text-slate-400 italic text-center py-10">目前尚無紀錄</p>';
                return;
            }
            leaderboardList.innerHTML = scores.map((s, i) => `
                <div class="flex justify-between items-center bg-white p-2 px-4 rounded-xl shadow-sm border border-slate-50">
                    <span class="font-black ${i < 3 ? 'text-indigo-600' : 'text-slate-400'}">#${i+1} ${s.name}</span>
                    <span class="font-black text-slate-700">${s.score} 分</span>
                </div>
            `).join('');
        }

        function startGame(mode) {
            isHardMode = mode === 'hard';
            score = 0; combo = 0; timeLeft = INITIAL_TIME; lives = 8; gameActive = true; isFever = false;
            scoreEl.innerText = '0'; timerEl.innerText = INITIAL_TIME;
            
            // 重置進度條
            timerBar.style.width = '100%';
            timerBar.className = 'h-full bg-emerald-400 w-full';

            document.getElementById('player-name-input').value = "";
            updateHearts(); updateComboUI();
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); startScreen.classList.remove('hidden'); endScreen.classList.add('hidden'); }, 500);
            generateChallenge(); draw();
            
            timerInterval = setInterval(() => { 
                timeLeft--; 
                timerEl.innerText = timeLeft; 
                
                // 更新進度條
                const percent = (timeLeft / INITIAL_TIME) * 100;
                timerBar.style.width = percent + '%';
                
                // 根據時間改變顏色
                if (timeLeft <= 10) {
                    timerBar.classList.replace('bg-emerald-400', 'bg-rose-500');
                    timerBar.classList.replace('bg-indigo-400', 'bg-rose-500');
                } else if (timeLeft <= 25) {
                    timerBar.classList.replace('bg-emerald-400', 'bg-indigo-400');
                }

                if (timeLeft <= 0) endGame("時間到！"); 
            }, 1000);
        }

        function endGame(reason) {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;
            document.getElementById('end-title').innerText = reason;
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            startScreen.classList.add('hidden'); endScreen.classList.remove('hidden');
        }

        document.getElementById('save-and-exit-btn').onclick = () => {
            const nameInput = document.getElementById('player-name-input');
            const playerName = nameInput.value.trim() || "匿名玩家";
            
            const storageKey = isHardMode ? 'cube_scores_hard' : 'cube_scores_normal';
            let scores = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            if (score > 0) {
                scores.push({ name: playerName, score: score, date: Date.now() });
                scores.sort((a, b) => b.score - a.score);
                localStorage.setItem(storageKey, JSON.stringify(scores.slice(0, 10)));
            }

            currentLeaderboardTab = isHardMode ? 'hard' : 'normal';
            updateLeaderboard();
            startScreen.classList.remove('hidden');
            endScreen.classList.add('hidden');
            overlay.classList.remove('opacity-0');
            overlay.classList.remove('hidden');
        };

        document.getElementById('tab-normal').onclick = () => updateLeaderboard('normal');
        document.getElementById('tab-hard').onclick = () => updateLeaderboard('hard');
        document.getElementById('start-btn-normal').onclick = () => startGame('normal');
        document.getElementById('start-btn-hard').onclick = () => startGame('hard');
        document.getElementById('quick-exit-btn').onclick = () => location.reload();

        window.onload = () => { initCanvas(); updateLeaderboard(); updateHearts(); };
        window.onresize = initCanvas;
    </script>
</body>
</html>
